<!doctype html>
<html lang="en">
  <head>
  <meta charset="UTF-8" />

  <!-- Primary SEO -->
  <title>Likwit Blvd | Custom Airbrush & Digital Art</title>
  <meta
    name="description"
    content="Custom airbrush artwork, tattoo-inspired design, and digital art by Likwit Blvd. Explore original pieces, shop prints, and commission custom work."
  />

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Critical homepage image hints -->
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />
  <link rel="preload" as="image" href="/hero-images/iwata.webp" type="image/webp" fetchpriority="high" />

  <!-- Open Graph / Social -->
  <meta property="og:title" content="Likwit Blvd | Custom Airbrush & Digital Art" />
  <meta
    property="og:description"
    content="Original airbrush artwork, digital design, and prints by Likwit Blvd."
  />
  <meta property="og:image" content="https://www.likwitblvd.com/og-image.png" />
  <meta property="og:url" content="https://www.likwitblvd.com" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/airbrush.png" />

  <!-- SPA routing restore: undoes the 404.html redirect before React boots -->
  <script>
    (function () {
      var p = window.location.search;
      if (p && p[1] === 'p') {
        var params = p.slice(1).split('&');
        var path   = params[0].slice(2).replace(/~and~/g, '&').replace(/^\/+/, '');
        var query  = params[1] ? '?' + params[1].slice(2).replace(/~and~/g, '&') : '';
        window.history.replaceState(
          null, null,
          '/' + path + query + window.location.hash
        );
      }
    })();
  </script>
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
