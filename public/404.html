<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA fallback for GitHub Pages.
      // Encodes the full path/query/hash into a query string so index.html
      // can restore it before React Router initialises.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        '/?p=/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
